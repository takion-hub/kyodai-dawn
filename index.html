<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dawn of Wisdom</title>
    <style>
        :root {
            --bg: #ffffff; --text: #1a1a1a; --kyodai: #003366;
            --card: #f8f9fa; --accent: #d32f2f;
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #0d1117; --text: #e6edf3; --kyodai: #58a6ff;
                --card: #161b22; --accent: #ff7b72;
            }
        }
        body {
            font-family: -apple-system, "Hiragino Kaku Gothic ProN", sans-serif;
            background-color: var(--bg); color: var(--text);
            margin: 0; display: flex; flex-direction: column; height: 100vh;
            overflow: hidden;
        }
        header {
            padding: 20px; text-align: center; font-weight: bold;
            font-size: 1.2rem; border-bottom: 1px solid #30363d;
            background: var(--bg); color: var(--kyodai);
        }
        /* カテゴリ選択 */
        .categories {
            display: flex; overflow-x: auto; padding: 10px; gap: 10px;
            -webkit-overflow-scrolling: touch;
        }
        .cat-btn {
            white-space: nowrap; padding: 8px 16px; border-radius: 20px;
            border: 1px solid var(--kyodai); background: none;
            color: var(--kyodai); font-size: 0.9rem;
        }
        .cat-btn.active { background: var(--kyodai); color: white; }

        /* メインカード */
        .main-content {
            flex: 1; display: flex; align-items: center; justify-content: center; padding: 20px;
        }
        .card {
            width: 100%; max-width: 400px; height: 450px;
            background: var(--card); border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            position: relative; perspective: 1000px;
        }
        .card-inner {
            position: relative; width: 100%; height: 100%;
            text-align: center; transition: transform 0.6s;
            transform-style: preserve-3d;
        }
        .card.flipped .card-inner { transform: rotateY(180deg); }
        .front, .back {
            position: absolute; width: 100%; height: 100%;
            backface-visibility: hidden; display: flex;
            flex-direction: column; align-items: center;
            justify-content: center; padding: 30px; box-sizing: border-box;
            border-radius: 24px;
        }
        .front { font-size: 2.2rem; font-weight: 800; }
        .back { transform: rotateY(180deg); font-size: 1.4rem; background: var(--card); }
        
        .hint { font-size: 0.9rem; color: #8b949e; margin-top: 15px; }

        /* 操作ボタン */
        .controls {
            padding: 30px; display: flex; gap: 15px; justify-content: center;
        }
        .btn {
            flex: 1; height: 60px; border-radius: 15px; border: none;
            font-size: 1rem; font-weight: bold; cursor: pointer;
        }
        .btn-x { background: #30363d; color: var(--accent); }
        .btn-o { background: var(--kyodai); color: white; }
    </style>
</head>
<body>

<header>Dawn of Wisdom</header>

<div class="categories" id="cat-list">
    <button class="cat-btn active" onclick="setFilter('all')">すべて</button>
    <button class="cat-btn" onclick="setFilter('社会')">社会・歴史</button>
    <button class="cat-btn" onclick="setFilter('科学')">科学・哲学</button>
    <button class="cat-btn" onclick="setFilter('生物')">生物・医療</button>
</div>

<div class="main-content">
    <div class="card" id="card" onclick="this.classList.toggle('flipped')">
        <div class="card-inner">
            <div class="front">
                <div id="q-word">Loading...</div>
                <div class="hint">タップで和訳を表示</div>
            </div>
            <div class="back">
                <div id="a-meaning">意味</div>
                <div id="a-note" class="hint"></div>
            </div>
        </div>
    </div>
</div>

<div class="controls">
    <button class="btn btn-x" onclick="handleNext(true)">❌ 復習</button>
    <button class="btn btn-o" onclick="handleNext(false)">✅ 習得</button>
</div>

<script>
    // 単語データ（1000個まで拡張可能）
    const masterData = [
        {w: "inevitable", m: "避けられない/必然的な", n: "哲学・科学論で頻出", c: "科学"},
        {w: "attribute", m: "～のせいにする/帰せしめる", n: "attribute A to B", c: "社会"},
        {w: "subjective", m: "主観的な", n: "客観的(objective)の対義語", c: "科学"},
        {w: "conformity", m: "同調/順応", n: "社会学・心理学テーマ", c: "社会"},
        {w: "intrinsic", m: "本来備わっている/内在的な", n: "内発的な動機づけなど", c: "生物"}
    ];

    let currentList = [...masterData];
    let currentIndex = 0;
    // ローカルストレージ（ブラウザを閉じても消えない保存機能）
    let masteredWords = JSON.parse(localStorage.getItem('kyodai_mastered')) || [];

    function updateUI() {
        const item = currentList[currentIndex];
        document.getElementById('q-word').innerText = item.w;
        document.getElementById('a-meaning').innerText = item.m;
        document.getElementById('a-note').innerText = item.n;
        document.getElementById('card').classList.remove('flipped');
    }

    function handleNext(isReview) {
        if (!isReview) {
            masteredWords.push(currentList[currentIndex].w);
            localStorage.setItem('kyodai_mastered', JSON.stringify(masteredWords));
        }
        currentIndex = (currentIndex + 1) % currentList.length;
        updateUI();
    }

    function setFilter(cat) {
        if(cat === 'all') {
            currentList = [...masterData];
        } else {
            currentList = masterData.filter(d => d.c === cat);
        }
        currentIndex = 0;
        updateUI();
        // ボタンの見た目更新
        document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
        event.target.classList.add('active');
    }

    updateUI();
</script>
</body>
</html>
