<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="apple-touch-icon" href="IMG_4521.jpeg">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Dawn of Wisdom: SUCCESS TRACKER</title>
    <style>
        :root {
            --kyodai-blue: #002147; --accent: #ff4b2b; --bg: #0a0e14;
            --card-bg: #1c2128; --text: #f0f6fc; --gray: #8b949e;
        }
        body { margin: 0; font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; }
        
        /* Countdown Header */
        header { padding: 35px 20px 10px; text-align: center; background: linear-gradient(to bottom, var(--kyodai-blue), var(--bg)); border-bottom: 1px solid rgba(255,255,255,0.1); }
        .countdown { font-size: 0.7rem; color: var(--accent); font-weight: bold; letter-spacing: 2px; margin-top: 5px; }

        .container { flex: 1; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        
        /* Progress Dashboard */
        .dashboard { width: 100%; max-width: 480px; background: var(--card-bg); border-radius: 20px; padding: 25px; margin-bottom: 20px; border: 1px solid #30363d; }
        .stat-row { margin-bottom: 15px; }
        .stat-label { display: flex; justify-content: space-between; font-size: 0.8rem; margin-bottom: 8px; }
        .progress-bar { width: 100%; height: 8px; background: #0d1117; border-radius: 4px; overflow: hidden; }
        .progress-fill { height: 100%; transition: width 0.5s ease-in-out; }

        .menu-btn { position: absolute; left: 15px; top: 45px; font-size: 1.5rem; background: none; border: none; color: white; cursor: pointer; }

        .drawer { position: fixed; top: 0; left: -280px; width: 280px; height: 100%; background: #0d1117; z-index: 100; transition: 0.3s; padding-top: 60px; box-shadow: 10px 0 30px rgba(0,0,0,0.5); }
        .drawer.open { left: 0; }
        .drawer-item { padding: 18px 25px; border-bottom: 1px solid #30363d; cursor: pointer; }
    </style>
</head>
<body>

<header>
    <button class="menu-btn" onclick="toggleMenu()">☰</button>
    <div style="font-weight: 900; letter-spacing: 2px;">DAWN OF WISDOM</div>
    <div id="countdown" class="countdown">GOAL: KYOTO UNIVERSITY</div>
</header>

<div class="container">
    <div class="dashboard">
        <div style="font-size: 0.9rem; font-weight: bold; margin-bottom: 20px; color: var(--accent);">📊 LEARNING PROGRESS</div>
        
        <div class="stat-row">
            <div class="stat-label"><span>CORE VOCAB (3000)</span><span id="vocab-pc">0%</span></div>
            <div class="progress-bar"><div id="vocab-fill" class="progress-fill" style="width: 0%; background: var(--kyodai-blue);"></div></div>
        </div>
        
        <div class="stat-row">
            <div class="stat-label"><span>MINE DISARM (100)</span><span id="mine-pc">0%</span></div>
            <div class="progress-bar"><div id="mine-fill" class="progress-fill" style="width: 0%; background: #ff4d4d;"></div></div>
        </div>

        <div class="stat-row">
            <div class="stat-label"><span>EX-KYODAI (300)</span><span id="ex-pc">0%</span></div>
            <div class="progress-bar"><div id="ex-fill" class="progress-fill" style="width: 0%; background: #c5a059;"></div></div>
        </div>
    </div>

    <button style="width: 100%; max-width: 480px; padding: 20px; border-radius: 15px; background: var(--accent); color: white; border: none; font-weight: bold; font-size: 1rem; cursor: pointer;" onclick="resumeStudy()">
        RESUME STUDYING
    </button>
</div>

<div id="drawer" class="drawer">
    <div class="drawer-item" onclick="location.reload()">🏠 ダッシュボード</div>
    <div class="drawer-item">📖 通常単語帳</div>
    <div class="drawer-item">⚠️ 地雷単語解体</div>
    <div class="drawer-item">🔍 精緻な和訳トレーニング</div>
    <div class="drawer-item">✍️ 合格フレーズ英作</div>
</div>

<script>
    // 京大入試日（仮：2027年2月25日）までのカウントダウン
    function updateCountdown() {
        const target = new Date('2027/02/25 09:00:00').getTime();
        const now = new Date().getTime();
        const diff = target - now;
        const days = Math.floor(diff / (1000 * 60 * 60 * 24));
        document.getElementById('countdown').innerText = `EXAM IN: ${days} DAYS`;
    }

    // ローカルストレージから進捗を取得して反映
    function loadProgress() {
        const stats = {
            vocab: JSON.parse(localStorage.getItem('stats_vocab') || "0"),
            mine: JSON.parse(localStorage.getItem('stats_mine') || "0"),
            ex: JSON.parse(localStorage.getItem('stats_ex') || "0")
        };

        // UI反映
        document.getElementById('vocab-fill').style.width = stats.vocab + "%";
        document.getElementById('vocab-pc').innerText = stats.vocab + "%";
        
        document.getElementById('mine-fill').style.width = stats.mine + "%";
        document.getElementById('mine-pc').innerText = stats.mine + "%";
        
        document.getElementById('ex-fill').style.width = stats.ex + "%";
        document.getElementById('ex-pc').innerText = stats.ex + "%";
    }

    function toggleMenu() { document.getElementById('drawer').classList.toggle('open'); }
    function resumeStudy() { alert("学習モードへ戻ります。"); }

    updateCountdown();
    loadProgress();
</script>
</body>
</html>
