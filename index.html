<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mastery 3000 - Ultimate Dashboard</title>
    <link rel="apple-touch-icon" href="IMG_4521.jpeg">
    <link rel="icon" href="IMG_4521.jpeg">
    <style>
        :root {
            --bg-dark: #050a14; --bg-card: #0a192f; --accent: #64ffda;
            --gold: #ffd700; --danger: #ff4d4d; --text-main: #ccd6f6; --text-sub: #8892b0; --sidebar-w: 300px;
        }
        body { font-family: 'Inter', sans-serif; margin: 0; background: var(--bg-dark); color: var(--text-main); display: flex; height: 100vh; overflow: hidden; }
        
        /* サイドバー */
        #sidebar { width: var(--sidebar-w); height: 100%; background: #020c1b; border-right: 1px solid #233554; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); position: fixed; z-index: 2000; display: flex; flex-direction: column; }
        #sidebar.hidden { transform: translateX(-100%); }
        .sidebar-scroll { flex: 1; overflow-y: auto; padding: 20px; }

        /* 画面切り替え */
        #view-dash, #view-study, #view-list { flex: 1; transition: 0.3s; display: none; height: 100vh; overflow-y: auto; }
        .active-view { display: flex !important; flex-direction: column; }
        #main { flex: 1; margin-left: var(--sidebar-w); transition: 0.3s; }
        #main.expanded { margin-left: 0; }

        /* 進捗ダッシュボード */
        .dash-container { padding: 40px; max-width: 800px; margin: 0 auto; width: 90%; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 20px; margin-top: 20px; }
        .stat-card { background: var(--bg-card); padding: 20px; border-radius: 15px; border: 1px solid #233554; text-align: center; }
        .progress-bar-bg { background: #112240; height: 25px; border-radius: 20px; margin: 20px 0; overflow: hidden; border: 1px solid #233554; }
        #progress-fill { background: var(--accent); height: 100%; width: 0%; transition: 1s cubic-bezier(0.075, 0.82, 0.165, 1); }

        /* 学習カード */
        .card-container { flex: 1; display: flex; align-items: center; justify-content: center; }
        .card { background: var(--bg-card); width: 85%; max-width: 550px; padding: 40px; border-radius: 25px; text-align: center; position: relative; border: 1px solid #233554; }
        .card.mastered { border-color: var(--gold); }
        .card.mine { border-color: var(--danger); }
        .word-main { font-size: 3.5rem; font-weight: 900; color: white; margin: 15px 0; }
        .word-sub { font-size: 1.4rem; color: var(--text-sub); cursor: pointer; min-height: 1.5em; margin-bottom: 20px; }
        .word-sub.blur { filter: blur(15px); opacity: 0.2; }

        /* ボタン・タグ */
        .btn { background: transparent; border: 1px solid var(--accent); color: var(--accent); padding: 8px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn.active { background: var(--accent); color: #000; }
        .btn.gold-btn.filled { background: var(--gold); color: #000; border-color: var(--gold); }
        .tag-small { font-size: 0.65rem; color: var(--accent); border: 1px solid var(--accent); padding: 1px 5px; border-radius: 3px; margin-right: 4px; transition: 0.2s; cursor: pointer; }
        .tag-small.active { background: var(--accent); color: #000; }

        .menu-toggle { position: fixed; top: 20px; left: 20px; z-index: 1000; }
        .search-input { width: 100%; padding: 10px; background: #112240; border: 1px solid var(--accent); color: white; border-radius: 5px; box-sizing: border-box; }
        #suggest-list { display: none; background: #112240; border: 1px solid var(--accent); margin-top: 2px; max-height: 150px; overflow-y: auto; border-radius: 5px; }
    </style>
</head>
<body>

    <nav id="sidebar">
        <div style="padding:20px; background:#112240; display:flex; justify-content:space-between; align-items:center;">
            <div style="display:flex; align-items:center; gap:10px;">
                <img src="IMG_4521.jpeg" style="width:35px; height:35px; border-radius:5px; object-fit:cover;">
                <h3 style="font-size:0.85rem; margin:0;">MASTER 3000</h3>
            </div>
            <button class="btn" style="border:none; font-size:1.2rem;" onclick="toggleSidebar()">×</button>
        </div>
        <div class="sidebar-scroll">
            <button class="btn" id="nav-dash" style="width:100%; margin-bottom:10px;" onclick="switchView('dash')">学習進捗状況</button>
            <button class="btn" id="nav-study" style="width:100%; margin-bottom:10px;" onclick="switchView('study')">学習カード画面</button>
            <button class="btn" id="nav-list" style="width:100%; margin-bottom:20px;" onclick="switchView('list')">全単語リスト管理</button>
            
            <input type="text" id="search-box" class="search-input" placeholder="単語検索..." oninput="showSuggest(this.value)">
            <div id="suggest-list"></div>

            <p style="font-size:0.75rem; color:var(--text-sub); margin-top:20px;">モード設定</p>
            <button class="btn" id="m-unlearned" style="width:100%; margin-bottom:8px; font-size:0.8rem;" onclick="toggleUnlearned()">未習得のみ: OFF</button>
            <button class="btn" id="m-mine" style="width:100%; margin-bottom:8px; font-size:0.8rem;" onclick="toggleMine()">地雷モード: OFF</button>
            <button class="btn" id="m-rev" style="width:100%; margin-bottom:20px; font-size:0.8rem;" onclick="toggleReverse()">和訳モード: OFF</button>

            <p style="font-size:0.75rem; color:var(--text-sub);">タグ絞り込み</p>
            <div id="tag-filters"></div>
        </div>
    </nav>

    <button id="open-btn" class="btn menu-toggle" style="display:none" onclick="toggleSidebar()">☰ MENU</button>

    <div id="main">
        <section id="view-dash" class="dash-container">
            <h2 style="color:var(--accent)">Learning Progress</h2>
            <div class="progress-bar-bg"><div id="progress-fill"></div></div>
            <div style="text-align:right; font-weight:bold; font-size:1.2rem;" id="progress-text">0%</div>
            
            <div class="stats-grid">
                <div class="stat-card">
                    <div style="font-size:0.8rem; color:var(--text-sub)">全単語数</div>
                    <div style="font-size:1.5rem; font-weight:bold;" id="stat-total">3000</div>
                </div>
                <div class="stat-card">
                    <div style="font-size:0.8rem; color:var(--gold)">習得済み</div>
                    <div style="font-size:1.5rem; font-weight:bold; color:var(--gold);" id="stat-mastered">0</div>
                </div>
                <div class="stat-card">
                    <div style="font-size:0.8rem; color:var(--accent)">未習得</div>
                    <div style="font-size:1.5rem; font-weight:bold; color:var(--accent);" id="stat-remaining">0</div>
                </div>
            </div>
            <button class="btn" style="margin-top:40px; width:100%; border-color:var(--danger); color:var(--danger);" onclick="resetData()">進捗をすべてリセットする</button>
        </section>

        <section id="view-study">
            <div class="card-container">
                <div class="card" id="main-card">
                    <div id="card-tags" style="margin-bottom:10px;"></div>
                    <div class="word-main" id="display-main">...</div>
                    <div class="word-sub blur" id="display-sub" onclick="this.classList.remove('blur')">Tap to reveal</div>
                    <div style="display:flex; gap:10px; justify-content:center;">
                        <button class="btn" onclick="move(-1)">PREV</button>
                        <button class="btn gold-btn" id="card-gotit" onclick="toggleMasteryCard()">GOT IT!</button>
                        <button class="btn" onclick="move(1)">NEXT</button>
                    </div>
                </div>
            </div>
        </section>

        <section id="view-list">
            <div class="list-header" style="padding:20px; background:#112240;">
                <div style="display:flex; gap:8px;">
                    <button class="btn active" id="tab-all" onclick="setListFilter('all')">すべて</button>
                    <button class="btn" id="tab-learned" onclick="setListFilter('learned')">習得済</button>
                    <button class="btn" id="tab-unlearned" onclick="setListFilter('unlearned')">未習得</button>
                </div>
            </div>
            <div id="word-list-container" style="overflow-y:auto;"></div>
        </section>
    </div>

    <script src="data.js"></script>
    <script>
        let currentIdx = parseInt(localStorage.getItem('study_pos')) || 0;
        let masteredMap = JSON.parse(localStorage.getItem('mastered_words')) || {};
        let activeTags = new Set();
        let listFilter = 'all';
        let isReverse = false, isMine = false, onlyUnlearned = false;

        function toggleSidebar() {
            const sb = document.getElementById('sidebar');
            sb.classList.toggle('hidden');
            document.getElementById('main').classList.toggle('expanded');
            document.getElementById('open-btn').style.display = sb.classList.contains('hidden') ? 'block' : 'none';
        }

        function switchView(v) {
            ['dash', 'study', 'list'].forEach(id => {
                document.getElementById('view-' + id).classList.toggle('active-view', id === v);
                document.getElementById('nav-' + id).classList.toggle('active', id === v);
            });
            if(v === 'dash') renderDash();
            if(v === 'list') renderList();
            if(v === 'study') renderCard();
        }

        function renderDash() {
            const total = words.length;
            const mastered = Object.keys(masteredMap).length;
            const percent = total > 0 ? Math.round((mastered / total) * 100) : 0;
            document.getElementById('stat-total').textContent = total;
            document.getElementById('stat-mastered').textContent = mastered;
            document.getElementById('stat-remaining').textContent = total - mastered;
            document.getElementById('progress-fill').style.width = percent + '%';
            document.getElementById('progress-text').textContent = percent + '%';
        }

        function showSuggest(val) {
            const list = document.getElementById('suggest-list');
            const q = val.toLowerCase().trim();
            if(!q) { list.style.display='none'; return; }
            const matches = words.filter(w => w.w.toLowerCase().includes(q) || w.m.includes(q)).slice(0, 10);
            list.innerHTML = matches.map(m => `<div style="padding:8px; border-bottom:1px solid #233554; cursor:pointer; font-size:0.8rem;" onclick="jumpTo('${m.w}')"><b>${m.w}</b></div>`).join('');
            list.style.display = 'block';
        }

        function jumpTo(word) {
            const idx = words.findIndex(w => w.w === word);
            if(idx !== -1) { currentIdx = idx; document.getElementById('search-box').value = ''; document.getElementById('suggest-list').style.display = 'none'; switchView('study'); }
        }

        function toggleUnlearned() { onlyUnlearned = !onlyUnlearned; document.getElementById('m-unlearned').classList.toggle('active', onlyUnlearned); renderCard(); }
        function toggleMine() { isMine = !isMine; document.getElementById('m-mine').classList.toggle('active', isMine); renderCard(); }
        function toggleReverse() { isReverse = !isReverse; document.getElementById('m-rev').classList.toggle('active', isReverse); renderCard(); }

        function renderCard() {
            const filtered = words.filter(w => (activeTags.size === 0 || w.t.some(t => activeTags.has(t))) && (!onlyUnlearned || !masteredMap[w.w]));
            if(filtered.length === 0) { document.getElementById('display-main').textContent = "No Data"; return; }
            if(currentIdx >= filtered.length) currentIdx = 0;
            const data = filtered[currentIdx];
            document.getElementById('display-main').textContent = isReverse ? data.m : data.w;
            document.getElementById('display-sub').textContent = isReverse ? data.w : data.m;
            document.getElementById('display-sub').classList.add('blur');
            document.getElementById('card-tags').innerHTML = data.t.map(t => `<span class="tag-small">${t}</span>`).join('');
            const isMastered = masteredMap[data.w];
            document.getElementById('main-card').classList.toggle('mastered', isMastered);
            document.getElementById('main-card').classList.toggle('mine', isMine);
            document.getElementById('card-gotit').classList.toggle('filled', isMastered);
            localStorage.setItem('study_pos', currentIdx);
        }

        function renderList() {
            const container = document.getElementById('word-list-container');
            const filtered = words.filter(w => {
                const tagMatch = activeTags.size === 0 || w.t.some(t => activeTags.has(t));
                const statusMatch = listFilter === 'all' || (listFilter === 'learned' ? masteredMap[w.w] : !masteredMap[w.w]);
                return tagMatch && statusMatch;
            });
            container.innerHTML = filtered.map(w => `
                <div style="display:flex; align-items:center; padding:15px; border-bottom:1px solid #233554; gap:15px;">
                    <div style="flex:1;"><b>${w.w}</b><br><small style="color:var(--text-sub)">${w.m}</small></div>
                    <button class="btn gold-btn ${masteredMap[w.w]?'filled':''}" onclick="toggleMasteryList('${w.w}', this)">${masteredMap[w.w]?'済':'未'}</button>
                </div>
            `).join('');
        }

        function toggleMasteryCard() {
            const filtered = words.filter(w => (activeTags.size === 0 || w.t.some(t => activeTags.has(t))) && (!onlyUnlearned || !masteredMap[w.w]));
            const w = filtered[currentIdx].w;
            if(masteredMap[w]) delete masteredMap[w]; else masteredMap[w] = true;
            localStorage.setItem('mastered_words', JSON.stringify(masteredMap));
            renderCard();
        }

        function toggleMasteryList(w, btn) {
            if(masteredMap[w]) delete masteredMap[w]; else masteredMap[w] = true;
            localStorage.setItem('mastered_words', JSON.stringify(masteredMap));
            renderList();
        }

        function move(s) {
            const filtered = words.filter(w => (activeTags.size === 0 || w.t.some(t => activeTags.has(t))) && (!onlyUnlearned || !masteredMap[w.w]));
            if(isMine && s > 0 && Math.random() < 0.2) currentIdx = Math.floor(Math.random() * filtered.length);
            else currentIdx = (currentIdx + s + filtered.length) % filtered.length;
            renderCard();
        }

        function toggleTag(t) {
            if(activeTags.has(t)) activeTags.delete(t); else activeTags.add(t);
            document.getElementById('tag-'+t).classList.toggle('active');
            renderCard(); renderList();
        }

        function setListFilter(f) {
            listFilter = f;
            ['all', 'learned', 'unlearned'].forEach(id => document.getElementById('tab-'+id).classList.toggle('active', id === f));
            renderList();
        }

        function resetData() { if(confirm("全進捗を消去しますか？")) { localStorage.clear(); location.reload(); } }

        window.onload = () => {
            const tags = new Set(); words.forEach(w => w.t.forEach(t => tags.add(t)));
            document.getElementById('tag-filters').innerHTML = Array.from(tags).sort().map(t => `<span class="tag-small" id="tag-${t}" onclick="toggleTag('${t}')">${t}</span>`).join('');
            switchView('dash');
        };
    </script>
</body>
</html>
