<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mastery 3000 - Pro Final</title>
    <link rel="apple-touch-icon" href="IMG_4521.jpeg">
    <link rel="icon" href="IMG_4521.jpeg">
    <style>
        :root {
            --bg-dark: #050a14; --bg-card: #0a192f; --accent: #64ffda;
            --gold: #ffd700; --danger: #ff4d4d; --text-main: #ccd6f6; --text-sub: #8892b0; --sidebar-w: 300px;
        }
        body { font-family: 'Inter', sans-serif; margin: 0; background: var(--bg-dark); color: var(--text-main); display: flex; height: 100vh; overflow: hidden; }
        
        /* サイドバー */
        #sidebar { width: var(--sidebar-w); height: 100%; background: #020c1b; border-right: 1px solid #233554; transition: 0.3s; position: fixed; z-index: 2000; display: flex; flex-direction: column; }
        #sidebar.hidden { transform: translateX(-100%); }
        .sidebar-scroll { flex: 1; overflow-y: auto; padding: 20px; }

        /* メインコンテンツ */
        #main { flex: 1; margin-left: var(--sidebar-w); transition: 0.3s; height: 100vh; overflow: hidden; position: relative; }
        #main.expanded { margin-left: 0; }

        /* 各画面セクション */
        section { display: none; height: 100vh; width: 100%; overflow-y: auto; padding-top: 70px; box-sizing: border-box; }
        .active-view { display: block !important; }

        /* 進捗ダッシュボード（中央揃え修正） */
        .dash-content { max-width: 600px; margin: 0 auto; padding: 20px; display: flex; flex-direction: column; align-items: center; text-align: center; }
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; width: 100%; margin-top: 20px; }
        .stat-card { background: var(--bg-card); padding: 15px; border-radius: 12px; border: 1px solid #233554; }

        /* 検索画面 */
        .search-res-header { padding: 0 20px 10px; border-bottom: 1px solid var(--accent); margin-bottom: 10px; }

        /* UIパーツ */
        .btn { background: transparent; border: 1px solid var(--accent); color: var(--accent); padding: 8px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn.active { background: var(--accent); color: #000; }
        .btn.gold-btn.filled { background: var(--gold); color: #000; border-color: var(--gold); }
        .tag-small { font-size: 0.65rem; color: var(--accent); border: 1px solid var(--accent); padding: 1px 5px; border-radius: 3px; margin: 3px; cursor: pointer; display: inline-block; }
        .tag-small.active { background: var(--accent); color: #000; }

        /* 入試カウントダウン */
        .countdown { background: rgba(100, 255, 218, 0.1); padding: 15px; border-radius: 10px; border: 1px solid var(--accent); text-align: center; margin-bottom: 20px; }

        .menu-toggle { position: fixed; top: 15px; left: 15px; z-index: 1500; background: var(--bg-dark); }
        .card-container { display: flex; justify-content: center; align-items: center; min-height: 70vh; }
        .card { background: var(--bg-card); width: 85%; max-width: 500px; padding: 40px; border-radius: 25px; text-align: center; border: 1px solid #233554; }
        .word-main { font-size: 3rem; font-weight: 900; color: white; margin: 10px 0; }
        .word-sub.blur { filter: blur(15px); opacity: 0.3; }

        /* リストのパディング調整 */
        .list-wrap { padding: 0 20px 100px; }
    </style>
</head>
<body>

    <nav id="sidebar">
        <div style="padding:20px; background:#112240; display:flex; justify-content:space-between; align-items:center;">
            <div style="display:flex; align-items:center; gap:10px;">
                <img src="IMG_4521.jpeg" style="width:30px; height:30px; border-radius:5px; object-fit:cover;">
                <span style="font-weight:bold; font-size:0.8rem;">MASTER 3000</span>
            </div>
            <button class="btn" style="border:none; font-size:1.2rem;" onclick="toggleSidebar()">×</button>
        </div>
        <div class="sidebar-scroll">
            <div class="countdown">
                <div style="font-size:0.7rem">入試まであと</div>
                <div style="font-size:1.6rem; font-weight:bold; color:var(--accent);" id="exam-days">---</div>
                <div style="font-size:0.6rem">DAYS</div>
            </div>

            <button class="btn" style="width:100%; margin-bottom:8px;" onclick="switchView('dash')">学習進捗状況</button>
            <button class="btn" style="width:100%; margin-bottom:8px;" onclick="switchView('study')">学習カード画面</button>
            <button class="btn" style="width:100%; margin-bottom:15px;" onclick="switchView('list')">全単語リスト管理</button>
            
            <input type="text" id="search-box" style="width:100%; padding:10px; background:#112240; border:1px solid var(--accent); color:white; border-radius:5px; box-sizing:border-box;" placeholder="単語を検索..." onkeyup="if(event.key==='Enter') startSearch()" oninput="showSuggest(this.value)">
            <div id="suggest-list" style="background:#0a192f; border-radius:5px; margin-top:2px;"></div>

            <p style="font-size:0.7rem; color:var(--text-sub); margin-top:15px;">タグ検索</p>
            <div id="tag-filters"></div>
        </div>
    </nav>

    <button id="open-btn" class="btn menu-toggle" style="display:none" onclick="toggleSidebar()">☰ MENU</button>

    <div id="main">
        <section id="view-dash">
            <div class="dash-content">
                <h2 style="color:var(--accent)">Progress Dashboard</h2>
                <div style="background:#112240; height:20px; width:100%; border-radius:10px; overflow:hidden; margin:20px 0; border:1px solid #233554;">
                    <div id="progress-fill" style="background:var(--accent); height:100%; width:0%; transition:1s;"></div>
                </div>
                <div style="font-size:2rem; font-weight:bold;" id="progress-text">0%</div>
                <div class="stats-grid">
                    <div class="stat-card"><div id="stat-total" style="font-size:1.2rem; font-weight:bold;">0</div><small>Total</small></div>
                    <div class="stat-card" style="color:var(--gold)"><div id="stat-mastered" style="font-size:1.2rem; font-weight:bold;">0</div><small>Mastered</small></div>
                    <div class="stat-card" style="color:var(--accent)"><div id="stat-rem" style="font-size:1.2rem; font-weight:bold;">0</div><small>Remaining</small></div>
                </div>
            </div>
        </section>

        <section id="view-search">
            <div class="search-res-header">
                <h3 style="margin:0;">Search Results</h3>
                <small id="search-info">単語を入力してください</small>
            </div>
            <div id="search-results-list" class="list-wrap"></div>
        </section>

        <section id="view-study">
            <div class="card-container">
                <div class="card" id="main-card">
                    <div id="card-tags"></div>
                    <div class="word-main" id="display-main">Loading...</div>
                    <div class="word-sub blur" id="display-sub" onclick="this.classList.remove('blur')">Tap to reveal</div>
                    <div style="display:flex; gap:10px; justify-content:center; margin-top:20px;">
                        <button class="btn" onclick="move(-1)">PREV</button>
                        <button class="btn gold-btn" id="card-gotit" onclick="toggleMasteryCard()">GOT IT!</button>
                        <button class="btn" onclick="move(1)">NEXT</button>
                    </div>
                </div>
            </div>
        </section>

        <section id="view-list">
            <div style="padding:0 20px 15px; display:flex; gap:10px;">
                <button class="btn active" id="tab-all" onclick="setListFilter('all')">すべて</button>
                <button class="btn" id="tab-learned" onclick="setListFilter('learned')">習得済</button>
                <button class="btn" id="tab-unlearned" onclick="setListFilter('unlearned')">未習得</button>
            </div>
            <div id="word-list-container" class="list-wrap"></div>
        </section>
    </div>

    <script src="data.js"></script>
    <script>
        let currentIdx = parseInt(localStorage.getItem('study_pos')) || 0;
        let masteredMap = JSON.parse(localStorage.getItem('mastered_words')) || {};
        let activeTags = new Set();
        let listFilter = 'all';
        const EXAM_DATE = new Date('2027-01-15');

        function toggleSidebar() {
            const sb = document.getElementById('sidebar');
            sb.classList.toggle('hidden');
            document.getElementById('main').classList.toggle('expanded');
            document.getElementById('open-btn').style.display = sb.classList.contains('hidden') ? 'block' : 'none';
        }

        function switchView(v) {
            document.querySelectorAll('section').forEach(s => s.classList.remove('active-view'));
            document.getElementById('view-' + v).classList.add('active-view');
            if(v === 'dash') renderDash();
            if(v === 'list') renderList();
            if(v === 'study') renderCard();
        }

        function renderDash() {
            const total = words.length, mastered = Object.keys(masteredMap).length;
            const percent = Math.round((mastered / total) * 100);
            document.getElementById('stat-total').textContent = total;
            document.getElementById('stat-mastered').textContent = mastered;
            document.getElementById('stat-rem').textContent = total - mastered;
            document.getElementById('progress-fill').style.width = percent + '%';
            document.getElementById('progress-text').textContent = percent + '%';
            
            const days = Math.ceil((EXAM_DATE - new Date()) / (1000*60*60*24));
            document.getElementById('exam-days').textContent = days > 0 ? days : 0;
        }

        function showSuggest(val) {
            const list = document.getElementById('suggest-list');
            const q = val.toLowerCase().trim();
            if(!q) { list.style.display='none'; return; }
            const matches = words.filter(w => w.w.toLowerCase().includes(q)).slice(0, 5);
            list.innerHTML = matches.map(m => `<div style="padding:10px; border-bottom:1px solid #233554; cursor:pointer; font-size:0.8rem;" onclick="jumpTo('${m.w}')">${m.w}</div>`).join('');
            list.style.display = 'block';
        }

        function jumpTo(word) {
            const idx = words.findIndex(w => w.w === word);
            if(idx !== -1) { currentIdx = idx; switchView('study'); }
        }

        function startSearch() {
            const q = document.getElementById('search-box').value.toLowerCase().trim();
            if(!q) return;
            switchView('search');
            const res = words.filter(w => w.w.toLowerCase().includes(q) || w.m.includes(q));
            document.getElementById('search-info').textContent = `${res.length} 件見つかりました`;
            renderWordList(res, 'search-results-list');
        }

        function renderCard() {
            const filtered = words.filter(w => activeTags.size === 0 || w.t.some(t => activeTags.has(t)));
            if(currentIdx >= filtered.length) currentIdx = 0;
            const data = filtered[currentIdx];
            document.getElementById('display-main').textContent = data.w;
            document.getElementById('display-sub').textContent = data.m;
            document.getElementById('display-sub').classList.add('blur');
            document.getElementById('card-tags').innerHTML = data.t.map(t => `<span class="tag-small">${t}</span>`).join('');
            const isMastered = masteredMap[data.w];
            document.getElementById('main-card').style.borderColor = isMastered ? 'var(--gold)' : '#233554';
            document.getElementById('card-gotit').classList.toggle('filled', isMastered);
            localStorage.setItem('study_pos', currentIdx);
        }

        function renderList() {
            const filtered = words.filter(w => {
                const tagMatch = activeTags.size === 0 || w.t.some(t => activeTags.has(t));
                const statusMatch = listFilter === 'all' || (listFilter === 'learned' ? masteredMap[w.w] : !masteredMap[w.w]);
                return tagMatch && statusMatch;
            });
            renderWordList(filtered, 'word-list-container');
        }

        function renderWordList(dataArray, containerId) {
            document.getElementById(containerId).innerHTML = dataArray.map(w => `
                <div style="display:flex; align-items:center; padding:12px; border-bottom:1px solid #233554;">
                    <div style="flex:1;"><b>${w.w}</b><br><small style="color:var(--text-sub)">${w.m}</small></div>
                    <button class="btn gold-btn ${masteredMap[w.w]?'filled':''}" onclick="toggleM('${w.w}', this)">${masteredMap[w.w]?'済':'未'}</button>
                </div>
            `).join('');
        }

        function toggleM(w, btn) {
            if(masteredMap[w]) delete masteredMap[w]; else masteredMap[w] = true;
            localStorage.setItem('mastered_words', JSON.stringify(masteredMap));
            btn.classList.toggle('filled'); btn.textContent = masteredMap[w] ? '済' : '未';
        }

        function toggleMasteryCard() {
            const filtered = words.filter(w => activeTags.size === 0 || w.t.some(t => activeTags.has(t)));
            const w = filtered[currentIdx].w;
            if(masteredMap[w]) delete masteredMap[w]; else masteredMap[w] = true;
            localStorage.setItem('mastered_words', JSON.stringify(masteredMap));
            renderCard();
        }

        function move(s) {
            const filtered = words.filter(w => activeTags.size === 0 || w.t.some(t => activeTags.has(t)));
            currentIdx = (currentIdx + s + filtered.length) % filtered.length;
            renderCard();
        }

        function toggleTag(t) {
            if(activeTags.has(t)) activeTags.delete(t); else activeTags.add(t);
            document.getElementById('tag-'+t).classList.toggle('active');
            const activeV = document.querySelector('section.active-view').id;
            if(activeV === 'view-study') renderCard();
            if(activeV === 'view-list') renderList();
        }

        function setListFilter(f) {
            listFilter = f;
            ['all', 'learned', 'unlearned'].forEach(id => document.getElementById('tab-'+id).classList.toggle('active', id === f));
            renderList();
        }

        window.onload = () => {
            const tags = new Set(); words.forEach(w => w.t.forEach(t => tags.add(t)));
            document.getElementById('tag-filters').innerHTML = Array.from(tags).sort().map(t => `<span class="tag-small" id="tag-${t}" onclick="toggleTag('${t}')">${t}</span>`).join('');
            renderDash();
            switchView('dash');
        };
    </script>
</body>
</html>
