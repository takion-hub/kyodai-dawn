<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="apple-touch-icon" href="icon.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Dawn of Wisdom</title>
    <style>
        :root {
            --kyodai-blue: #002147; --accent: #ff4b2b; --bg: #0a0e14;
            --card-bg: #1c2128; --text: #f0f6fc; --gray: #8b949e;
        }
        body {
            margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column;
        }
        header {
            padding: 40px 20px 20px; text-align: center; background: linear-gradient(to bottom, #002147, var(--bg));
            font-size: 1.4rem; font-weight: 900; letter-spacing: 2px; color: #fff; text-shadow: 0 0 10px rgba(88,166,255,0.5);
        }
        .mode-switch {
            display: flex; justify-content: center; gap: 10px; padding: 10px;
        }
        .m-btn {
            background: rgba(255,255,255,0.1); border: 1px solid var(--gray); color: var(--text);
            padding: 8px 15px; border-radius: 20px; font-size: 0.8rem;
        }
        .m-btn.active { background: var(--accent); border-color: var(--accent); font-weight: bold; }

        .container { flex: 1; display: flex; align-items: center; justify-content: center; padding: 20px; overflow-y: auto; }
        
        /* カードデザイン */
        .card {
            width: 100%; max-width: 450px; background: var(--card-bg); border-radius: 30px;
            padding: 30px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1);
            text-align: center;
        }
        .word-display { font-size: 2.5rem; font-weight: bold; margin-bottom: 20px; color: #fff; }
        .sentence-display { text-align: left; line-height: 1.8; font-size: 1.1rem; color: var(--text); margin: 20px 0; padding: 15px; background: rgba(0,0,0,0.2); border-radius: 15px; }
        .underline { text-decoration: underline; text-decoration-color: var(--accent); text-underline-offset: 5px; font-weight: bold; }
        
        textarea {
            width: 100%; background: #000; border: 1px solid #30363d; border-radius: 15px;
            color: #fff; padding: 15px; font-size: 1rem; box-sizing: border-box; margin-bottom: 15px;
        }

        .ans-box { display: none; background: #2d333b; padding: 15px; border-radius: 15px; text-align: left; margin-top: 15px; }
        .btn-group { display: flex; gap: 10px; margin-top: 20px; }
        .btn { flex: 1; padding: 18px; border-radius: 15px; border: none; font-weight: bold; font-size: 1rem; }
        .btn-main { background: var(--accent); color: #fff; }
        .btn-sub { background: #30363d; color: var(--gray); }
    </style>
</head>
<body>

<header>DAWN OF WISDOM</header>

<div class="mode-switch">
    <button id="m-vocab" class="m-btn active" onclick="setMode('vocab')">単語帳</button>
    <button id="m-wayaku" class="m-btn" onclick="setMode('wayaku')">和訳練習</button>
</div>

<div class="container">
    <div class="card">
        <div id="vocab-content">
            <div id="target-word" class="word-display">Loading...</div>
            <div id="vocab-ans" class="ans-box">
                <div style="color: var(--accent); font-weight: bold;">意味</div>
                <div id="meaning-text" style="font-size: 1.3rem; margin: 10px 0;"></div>
                <div id="note-text" style="font-size: 0.9rem; color: var(--gray);"></div>
            </div>
            <div class="btn-group">
                <button class="btn btn-sub" onclick="toggleAns()">答えを見る</button>
                <button class="btn btn-main" onclick="nextWord(true)">✅ 習得</button>
                <button class="btn btn-main" style="background:#444;" onclick="nextWord(false)">❌ 復習</button>
            </div>
        </div>

        <div id="wayaku-content" style="display:none;">
            <div id="long-text" class="sentence-display"></div>
            <textarea id="user-translation" rows="4" placeholder="下線部を和訳..."></textarea>
            <div id="wayaku-ans" class="ans-box">
                <div style="color: var(--accent); font-weight: bold;">模範解答</div>
                <div id="model-ans" style="margin: 10px 0;"></div>
            </div>
            <div class="btn-group">
                <button class="btn btn-sub" onclick="toggleWayakuAns()">解答表示</button>
                <button class="btn btn-main" onclick="nextWayaku()">次の長文</button>
            </div>
        </div>
    </div>
</div>

<script>
    let mode = 'vocab';
    const vocabData = [
        {w: "inevitable", m: "避けられない/必然的な", n: "哲学・科学論で頻出。対義語はcontingent(偶然の)"},
        {w: "attribute", m: "～に帰せしめる/～のせいにする", n: "attribute A to B の語順を瞬時に見抜くこと"},
        {w: "virtually", m: "事実上/ほとんど", n: "「仮想の」と訳すと京大では減点対象"}
    ];

    const wayakuData = [
        {
            text: "The scientific revolution was not merely a collection of discoveries; it was a <span class='underline'>fundamental shift in the human relationship with the world</span>.",
            ans: "人間と世界との関わりにおける根本的な転換"
        },
        {
            text: "Language is a living entity that <span class='underline'>evolves in response to the changing needs of its speakers</span>.",
            ans: "話し手の変化するニーズに応じて進化するものだ"
        }
    ];

    let vIdx = 0, wIdx = 0;

    function setMode(m) {
        mode = m;
        document.getElementById('m-vocab').classList.toggle('active', m === 'vocab');
        document.getElementById('m-wayaku').classList.toggle('active', m === 'wayaku');
        document.getElementById('vocab-content').style.display = m === 'vocab' ? 'block' : 'none';
        document.getElementById('wayaku-content').style.display = m === 'wayaku' ? 'block' : 'none';
        render();
    }

    function render() {
        if(mode === 'vocab') {
            const d = vocabData[vIdx];
            document.getElementById('target-word').innerText = d.w;
            document.getElementById('meaning-text').innerText = d.m;
            document.getElementById('note-text').innerText = d.n;
            document.getElementById('vocab-ans').style.display = 'none';
        } else {
            const d = wayakuData[wIdx];
            document.getElementById('long-text').innerHTML = d.text;
            document.getElementById('model-ans').innerText = d.ans;
            document.getElementById('wayaku-ans').style.display = 'none';
            document.getElementById('user-translation').value = '';
        }
    }

    function toggleAns() { document.getElementById('vocab-ans').style.display = 'block'; }
    function toggleWayakuAns() { document.getElementById('wayaku-ans').style.display = 'block'; }
    function nextWord(ok) { vIdx = (vIdx + 1) % vocabData.length; render(); }
    function nextWayaku() { wIdx = (wIdx + 1) % wayakuData.length; render(); }

    setMode('vocab');
</script>
</body>
</html>
